name: Build XiaoZhi Firmware (ESP32-C6)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build with official ESP-IDF docker
      run: |
        docker run --rm -v ${{ github.workspace }}:/project \
          -w /project \
          espressif/idf:v5.4.1 \
          bash -c "
            ./install.sh esp32c6 && \
            . ./export.sh && \
            idf.py set-target esp32c6 && \
            idf.py build
          "

    # 重要：小智项目 v2 版本的固件输出路径（根据最新仓库实际情况）
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xiaozhi-firmware-esp32c6
        path: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/firmware.bin               # ← 最常见的主固件名称
          build/xiaozhi.bin                # 部分板型/分支会生成此名称，保险起见都包含
          build/*.bin                      # 兜底方案，包含所有 .bin 文件
        retention-days: 7

    # 可选：自动创建 GitHub Release（仅在 main 分支 push 时触发）
    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: auto-build-${{ github.run_number }}
        name: Auto Build ${{ github.run_number }} (ESP32-C6)
        draft: false
        prerelease: true
        files: |
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/firmware.bin
          build/xiaozhi.bin
        body: |
          **自动构建固件（ESP32-C6）**
          Commit: ${{ github.sha }}
          生成时间: ${{ github.event.head_commit.timestamp }}
          注意：请先验证是否能正常烧录到您的 Waveshare ESP32-C6-Touch-LCD-1.83
