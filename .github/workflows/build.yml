# .github/workflows/build-xiaozhi.yml

name: Build XiaoZhi Firmware

on:
  workflow_dispatch:    # 手动触发
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build & Export firmware
      run: |
        # 使用社区比较成熟的 esp-idf 镜像（推荐 espressif 的官方镜像）
        docker run --rm -v ${{ github.workspace }}:/project \
          -w /project \
          -e BOARD=esp32s3box   # ← 改成你自己的板子型号
          espressif/idf: v5.3.2 \
          bash -c "
            ./install.sh esp32c6       && \
            . ./export.sh              && \
            idf.py set-target esp32c6  && \
            idf.py menuconfig          || true && \   # 如果有预设sdkconfig可以跳过
            idf.py build
          "

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: xiaozhi-firmware
        path: |
          build/xiaozhi-esp32.bin
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
          build/xiaozhi-esp32.spiffs.bin   # 如果有SPIFFS分区
        retention-days: 7

    # 可选：如果要自动发布到Release
    - name: Create Release & Upload
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: XiaoZhi Firmware ${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          build/xiaozhi-esp32.bin
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
        body: |
          Auto built by GitHub Actions
          Commit: ${{ github.sha }}
